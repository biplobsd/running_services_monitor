name: Update Contributors

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  update-contributors:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    name: 📊 Update Contributors Data

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔄 Fetch Contributors Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching contributors..."
          gh api repos/${{ github.repository }}/contributors --paginate > contributors_raw.json
          
          echo "Fetching merged pull requests..."
          gh api repos/${{ github.repository }}/pulls?state=closed\&per_page=100 --paginate > prs_raw.json

      - name: 📝 Process and Generate JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import os
          
          # Load existing data to preserve historical names and PRs
          contributors_file = 'assets/contributors.json'
          existing_data = []
          if os.path.exists(contributors_file):
              try:
                  with open(contributors_file, 'r') as f:
                      existing_data = json.load(f)
              except Exception as e:
                  print(f"Error loading existing contributors: {e}")
          
          existing_map = {c['login']: c for c in existing_data}
          
          # Load raw data from GitHub API
          with open('contributors_raw.json', 'r') as f:
              contributors_data = json.load(f)
          
          with open('prs_raw.json', 'r') as f:
              prs_raw_data = json.load(f)
          
          # Group new PRs by user
          new_pr_by_user = {}
          for pr in prs_raw_data:
              if pr.get('merged_at') and pr.get('user'):
                  username = pr['user']['login']
                  if username not in new_pr_by_user:
                      new_pr_by_user[username] = []
                  new_pr_by_user[username].append({
                      'number': pr['number'],
                      'title': pr['title']
                  })
          
          def get_user_name(username):
              try:
                  result = subprocess.run(
                      ['gh', 'api', f'users/{username}', '--jq', '.name'],
                      capture_output=True, text=True, timeout=10
                  )
                  name = result.stdout.strip()
                  return name if name and name != 'null' and name != '' else None
              except:
                  return None
          
          # Merge data
          updated_map = existing_map.copy()
          
          for contributor in contributors_data:
              if contributor.get('type') == 'Bot':
                  continue
              
              username = contributor['login']
              new_contributions = contributor['contributions']
              
              # Get existing entry or initialize new
              entry = updated_map.get(username, {
                  'login': username,
                  'name': None,
                  'contributions': 0,
                  'pullRequests': []
              })
              
              # Update contributions count
              entry['contributions'] = new_contributions
              
              # Update name if missing or null
              if not entry.get('name') or entry['name'] == 'null':
                  fetched_name = get_user_name(username)
                  if fetched_name:
                      entry['name'] = fetched_name
              
              # Merge PRs ensuring uniqueness by number
              existing_prs = {pr['number']: pr for pr in entry.get('pullRequests', [])}
              if username in new_pr_by_user:
                  for pr in new_pr_by_user[username]:
                      existing_prs[pr['number']] = pr
              
              entry['pullRequests'] = sorted(existing_prs.values(), key=lambda x: x['number'], reverse=True)
              updated_map[username] = entry
          
          # Convert back to list and sort by contributions
          result = list(updated_map.values())
          result.sort(key=lambda x: x['contributions'], reverse=True)
          
          with open(contributors_file, 'w') as f:
              json.dump(result, f, indent=2)
          
          print(f"Updated contributors.json with {len(result)} contributors")
          EOF

      - name: 🧹 Cleanup
        run: |
          rm -f contributors_raw.json prs_raw.json

      - name: 📤 Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add assets/contributors.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update contributors data"
            git push
          fi
